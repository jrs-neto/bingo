<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo - Paróquia Santa Edwiges</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <div id="telaEspera" class="tela-espera">
    <button class="btn-fechar-espera" onclick="fecharTelaEspera()">&times;</button>

    <div class="conteudo-espera">
      <img src="./img/tela-inicial.png" alt="Paróquia Santa Edwiges" class="logo-espera">
      <h2>Paróquia Santa Edwiges</h2>
      <p>Nosso bingo começará em instantes...</p>
    </div>
  </div>

  <button id="btnNovoJogo" onclick="confirmarNovoJogo()">
    Novo Jogo
  </button>

  <div class="topo">
    <img src="./img/logo.jpeg" alt="Paróquia Santa Edwiges" class="logo">

    <div class="centro-topo">
      <h1>ÚLTIMO NÚMERO SORTEADO</h1>
      <div id="ultimo">--</div>
    </div>

    <img src="./img/logo.jpeg" alt="Paróquia Santa Edwiges" class="logo">
  </div>

  <div class="grid" id="grid"></div>

  <section id="historico">
    <h2>Histórico</h2>
    <div id="lista">
      Nenhum número sorteado.
    </div>
  </section>

  <footer>
    Paróquia Santa Edwiges
  </footer>

  <div id="customModal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">Confirmação</h3>
      <p id="modalMessage">Deseja realizar esta ação?</p>
      <div class="modal-buttons">
        <button id="modalBtnCancel" class="btn-modal-cancel">Cancelar</button>
        <button id="modalBtnConfirm" class="btn-modal-confirm">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="./js/script.js"></script>

</body>

</html>
